apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: all-microservices
  namespace: argocd
spec:
  goTemplate: true                                    
  goTemplateOptions: ["missingkey=error"]             
  generators:
    - git:
        repoURL: https://github.com/BernardoJose90/Applications.git  
        revision: main
        directories:
          - path: "*/kubernetes"
  template:
    metadata:
      name: '{{.path.basename}}'                      
    spec:
      project: default
      source:
        repoURL: https://github.com/BernardoJose90/Applications.git
        targetRevision: main
        path: '{{.path.path}}'                        
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basenameNormalized}}'     
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true