apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xvpcs.aws.platform.upbound.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    platform/owner: "platform-engineering"
    platform/slack-channel: "#platform-support"
    platform/runbook: "https://wiki.company.com/platform/vpc"
  labels:
    platform/capability: networking
    platform/provider: aws
    platform/tier: standard

spec:
  group: aws.platform.upbound.io
  names:
    kind: XVpc
    plural: xvpcs
  claimNames:
    kind: Vpc
    plural: vpcs

  connectionSecretKeys:
    - vpcId
    - publicSubnetIds
    - privateSubnetIds
    - region

  versions:
    - name: v1alpha1
      served: true
      referenceable: true

      additionalPrinterColumns:
        - name: REGION
          type: string
          jsonPath: .spec.parameters.region
        - name: CIDR
          type: string
          jsonPath: .spec.parameters.cidr
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: SYNCED
          type: string
          jsonPath: .status.conditions[?(@.type=='Synced')].status
        - name: VPC-ID
          type: string
          jsonPath: .status.vpcId
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp

      schema:
        openAPIV3Schema:
          type: object
          properties:

            spec:
              type: object
              required:
                - parameters
              properties:

                parameters:
                  type: object
                  required:
                    - region
                    - cidr
                  properties:

                    region:
                      type: string
                      description: "AWS region to deploy the VPC in."
                      enum:
                        - us-east-1
                        - eu-west-2
                      default: eu-west-2

                    cidr:
                      type: string
                      description: "Primary CIDR block for the VPC. e.g. 10.0.0.0/16"
                      pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
                      default: "10.0.0.0/16"

                    tags:
                      type: object
                      description: "Additional AWS tags to apply to all VPC resources."
                      additionalProperties:
                        type: string

                    deletionPolicy:
                      type: string
                      description: "Delete removes the real AWS resources. Orphan leaves them in AWS."
                      enum:
                        - Delete
                        - Orphan
                      default: Delete

            status:
              type: object
              properties:
                vpcId:
                  type: string
                  description: "The ID of the created VPC."
                publicSubnetIds:
                  type: string
                  description: "Comma-separated IDs of the public subnets."
                privateSubnetIds:
                  type: string
                  description: "Comma-separated IDs of the private subnets."
                internetGatewayId:
                  type: string
                  description: "The ID of the Internet Gateway."
                region:
                  type: string
                  description: "The AWS region where the VPC was created."
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string