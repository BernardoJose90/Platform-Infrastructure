apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xbuckets.aws.platform.upbound.io
  labels:
    platform/capability: storage
    platform/provider: aws
    platform/tier: standard
  annotations:
    platform/owner: "platform-engineering"
    platform/slack-channel: "#platform-support"
    platform/runbook: "https://wiki.company.com/platform/s3"

spec:
  group: aws.platform.upbound.io
  names:
    kind: XBucket
    plural: xbuckets
  claimNames:
    kind: Bucket
    plural: buckets

  connectionSecretKeys:
    - endpoint
    - bucketName
    - bucketArn
    - region

  versions:
    - name: v1alpha1
      served: true
      referenceable: true

      additionalPrinterColumns:
        - name: REGION
          type: string
          jsonPath: .spec.parameters.region
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: SYNCED
          type: string
          jsonPath: .status.conditions[?(@.type=='Synced')].status
        - name: BUCKET-NAME
          type: string
          jsonPath: .status.bucketName
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp

      schema:
        openAPIV3Schema:
          type: object
          properties:

            spec:
              type: object
              required:
                - parameters
              properties:

                parameters:
                  type: object
                  required:
                    - region
                  properties:

                    region:
                      type: string
                      description: "AWS region to deploy the S3 bucket in."
                      enum:
                        - us-east-1
                        - us-west-2
                        - eu-west-1
                        - eu-central-1
                        - ap-southeast-1
                      default: us-east-1

                    bucketName:
                      type: string
                      description: "Optional custom name for the S3 bucket. Must be globally unique. If omitted, a name is auto-generated."
                      minLength: 3
                      maxLength: 63
                      pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"

                    # CHANGED: string enum instead of boolean
                    # Value matches exactly what AWS S3 expects — no transform needed
                    versioning:
                      type: string
                      description: "Enable S3 object versioning. Use Enabled or Suspended."
                      enum:
                        - "Enabled"
                        - "Suspended"
                      default: "Suspended"

                    encryption:
                      type: object
                      description: "Server-side encryption configuration."
                      properties:
                        enabled:
                          type: boolean
                          description: "Enable server-side encryption (SSE-S3 by default)."
                          default: true
                        kmsKeyId:
                          type: string
                          description: "Optional KMS Key ID or ARN for SSE-KMS encryption. If omitted, SSE-S3 (AES-256) is used."
                      default:
                        enabled: true

                    blockPublicAccess:
                      type: boolean
                      description: "Block all public access to the bucket. Strongly recommended."
                      default: true

                    lifecycle:
                      type: object
                      description: "Object lifecycle management configuration."
                      properties:
                        # CHANGED: string enum instead of boolean
                        # Value matches exactly what AWS S3 expects — no transform needed
                        enabled:
                          type: string
                          description: "Enable lifecycle rules. Use Enabled or Disabled."
                          enum:
                            - "Enabled"
                            - "Disabled"
                          default: "Disabled"
                        expirationDays:
                          type: integer
                          description: "Number of days after which objects are deleted."
                          minimum: 1
                          maximum: 3650
                        noncurrentVersionExpirationDays:
                          type: integer
                          description: "Days after which non-current object versions are deleted. Only applies when versioning is Enabled."
                          minimum: 1
                          maximum: 3650

                    cors:
                      type: object
                      description: "Cross-Origin Resource Sharing (CORS) configuration."
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        allowedOrigins:
                          type: array
                          description: "List of allowed origins (e.g. https://app.company.com)."
                          items:
                            type: string
                        allowedMethods:
                          type: array
                          description: "Allowed HTTP methods."
                          items:
                            type: string
                            enum: [GET, PUT, POST, DELETE, HEAD]

                    tags:
                      type: object
                      description: "Additional AWS tags to apply to the bucket."
                      additionalProperties:
                        type: string

                    deletionPolicy:
                      type: string
                      description: "What happens to the AWS bucket when this resource is deleted."
                      enum:
                        - Delete
                        - Orphan
                      default: Delete

            status:
              type: object
              properties:
                bucketName:
                  type: string
                  description: "The actual name of the created S3 bucket in AWS."
                bucketArn:
                  type: string
                  description: "The ARN of the created S3 bucket."
                region:
                  type: string
                  description: "The AWS region where the bucket was created."
                endpoint:
                  type: string
                  description: "The S3 bucket endpoint URL."
                conditions:
                  type: array
                  description: "Crossplane conditions reflecting the health of this resource."
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string