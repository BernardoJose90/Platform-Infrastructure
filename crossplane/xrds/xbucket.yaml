apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xbuckets.aws.platform.upbound.io
  labels:
    platform/capability: storage
    platform/provider: aws
    platform/tier: standard
  annotations:
    platform/owner: "platform-engineering"
    platform/slack-channel: "#platform-support"
    platform/runbook: "https://wiki.company.com/platform/s3"

spec:
  group: aws.platform.upbound.io
  names:
    kind: XBucket
    plural: xbuckets
  claimNames:
    kind: Bucket
    plural: buckets

  connectionSecretKeys:
    - endpoint
    - bucketName
    - bucketArn
    - region

  versions:
    - name: v1alpha1
      served: true
      referenceable: true

      additionalPrinterColumns:
        - name: REGION
          type: string
          jsonPath: .spec.parameters.region
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: SYNCED
          type: string
          jsonPath: .status.conditions[?(@.type=='Synced')].status
        - name: BUCKET-NAME
          type: string
          jsonPath: .status.bucketName
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp

      schema:
        openAPIV3Schema:
          type: object
          properties:

            spec:
              type: object
              required:
                - parameters
              properties:

                parameters:
                  type: object
                  required:
                    - region
                  properties:

                    region:
                      type: string
                      description: "AWS region to deploy the S3 bucket in."
                      enum:
                        - us-east-1
                        - eu-west-2
                      default: us-east-1

                    bucketName:
                      type: string
                      description: "Optional custom bucket name. Must be globally unique. If omitted, auto-generated."
                      minLength: 3
                      maxLength: 63
                      pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"

                    versioning:
                      type: string
                      description: "Enable S3 object versioning. Use Enabled or Suspended."
                      enum:
                        - "Enabled"
                        - "Suspended"
                      default: "Suspended"

                    encryption:
                      type: object
                      description: "Server-side encryption configuration."
                      properties:
                        kmsKeyId:
                          type: string
                          description: "Optional KMS Key ARN for SSE-KMS. If omitted, SSE-S3 (AES-256) is used."
                      default: {}

                    blockPublicAccess:
                      type: boolean
                      description: "Block all public access. Keep true unless static website hosting."
                      default: true

                    # Lifecycle is always Enabled — no toggle
                    # Teams only control the expiration values
                    lifecycle:
                      type: object
                      description: "Lifecycle rules are always enabled. Control how long objects are retained."
                      properties:
                        expirationDays:
                          type: integer
                          description: "Days after which objects are permanently deleted."
                          minimum: 1
                          maximum: 3650
                          default: 365
                        noncurrentVersionExpirationDays:
                          type: integer
                          description: "Days after which non-current versions are deleted. Effective when versioning is Enabled."
                          minimum: 1
                          maximum: 3650
                          default: 90
                        abortIncompleteMultipartUploadDays:
                          type: integer
                          description: "Days after which incomplete multipart uploads are aborted. Prevents unexpected storage costs."
                          minimum: 1
                          maximum: 30
                          default: 7
                      default:
                        expirationDays: 365
                        noncurrentVersionExpirationDays: 90
                        abortIncompleteMultipartUploadDays: 7

                    tags:
                      type: object
                      description: "Additional AWS tags to apply to the bucket."
                      additionalProperties:
                        type: string

                    deletionPolicy:
                      type: string
                      description: "Delete removes the real AWS bucket. Orphan leaves it in AWS."
                      enum:
                        - Delete
                        - Orphan
                      default: Delete

            status:
              type: object
              properties:
                bucketName:
                  type: string
                  description: "The actual name of the created S3 bucket in AWS."
                bucketArn:
                  type: string
                  description: "The ARN of the created S3 bucket."
                region:
                  type: string
                  description: "The AWS region where the bucket was created."
                endpoint:
                  type: string
                  description: "The S3 bucket endpoint URL."
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string