apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xbuckets.aws.platform.upbound.io
  labels:
    platform/capability: storage
    platform/provider: aws
    platform/tier: standard
  annotations:
    platform/owner: "platform-engineering"
    platform/slack-channel: "#platform-support"
    # NOTE: BucketLifecycleConfiguration removed due to a known bug in
    # upbound/provider-aws-s3 v2.x — "Missing Resource Identity After Read"
    # Lifecycle rules are applied directly via AWS CLI as a workaround.
    # Track fix: https://github.com/crossplane-contrib/provider-upjet-aws/issues

spec:
  compositeTypeRef:
    apiVersion: aws.platform.upbound.io/v1alpha1
    kind: XBucket

  mode: Pipeline

  pipeline:

    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:

          # ============================================================
          # RESOURCE 1: S3 Bucket
          # Creates first — status.bucketName is written back once ready.
          # All other resources wait for status.bucketName via policy: Required.
          # ============================================================
          - name: s3-bucket
            base:
              apiVersion: s3.aws.upbound.io/v1beta1
              kind: Bucket
              spec:
                deletionPolicy: Delete
                forProvider:
                  region: us-east-1
                  forceDestroy: false
                writeConnectionSecretToRef:
                  namespace: crossplane-system
                  name: ""

            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.region

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.bucketName
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                policy:
                  fromFieldPath: Optional

              - type: FromCompositeFieldPath
                fromFieldPath: metadata.uid
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "bucket-%s"
                policy:
                  fromFieldPath: Optional

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.deletionPolicy
                toFieldPath: spec.deletionPolicy

              - type: FromCompositeFieldPath
                fromFieldPath: metadata.uid
                toFieldPath: spec.writeConnectionSecretToRef.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "bucket-conn-%s"

              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels[crossplane.io/composite]
                toFieldPath: spec.forProvider.tags[platform/composite-name]

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.tags[platform/region]

              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.tags[platform/managed-by]
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "crossplane"

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.tags
                toFieldPath: spec.forProvider.tags
                policy:
                  fromFieldPath: Optional

              # Write bucket name back to XR status
              - type: ToCompositeFieldPath
                fromFieldPath: metadata.annotations[crossplane.io/external-name]
                toFieldPath: status.bucketName

              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.arn
                toFieldPath: status.bucketArn

              - type: ToCompositeFieldPath
                fromFieldPath: spec.forProvider.region
                toFieldPath: status.region

            connectionDetails:
              - name: bucketName
                fromFieldPath: metadata.annotations[crossplane.io/external-name]
                type: FromFieldPath
              - name: bucketArn
                fromFieldPath: status.atProvider.arn
                type: FromFieldPath
              - name: region
                fromFieldPath: spec.forProvider.region
                type: FromFieldPath
              - name: endpoint
                fromFieldPath: status.atProvider.websiteEndpoint
                type: FromFieldPath

          # ============================================================
          # RESOURCE 2: Public Access Block
          # Waits for bucket to exist via policy: Required on bucketName
          # ============================================================
          - name: s3-public-access-block
            base:
              apiVersion: s3.aws.upbound.io/v1beta1
              kind: BucketPublicAccessBlock
              spec:
                forProvider:
                  region: us-east-1
                  bucket: ""
                  blockPublicAcls: true
                  blockPublicPolicy: true
                  ignorePublicAcls: true
                  restrictPublicBuckets: true

            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.region

              - type: FromCompositeFieldPath
                fromFieldPath: status.bucketName
                toFieldPath: spec.forProvider.bucket
                policy:
                  fromFieldPath: Required

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.blockPublicAccess
                toFieldPath: spec.forProvider.blockPublicAcls

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.blockPublicAccess
                toFieldPath: spec.forProvider.blockPublicPolicy

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.blockPublicAccess
                toFieldPath: spec.forProvider.ignorePublicAcls

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.blockPublicAccess
                toFieldPath: spec.forProvider.restrictPublicBuckets

          # ============================================================
          # RESOURCE 3: Server-Side Encryption
          # Waits for bucket to exist via policy: Required on bucketName
          # ============================================================
          - name: s3-encryption
            base:
              apiVersion: s3.aws.upbound.io/v1beta1
              kind: BucketServerSideEncryptionConfiguration
              spec:
                forProvider:
                  region: us-east-1
                  bucket: ""
                  rule:
                    - applyServerSideEncryptionByDefault:
                        - sseAlgorithm: AES256
                      bucketKeyEnabled: true

            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.region

              - type: FromCompositeFieldPath
                fromFieldPath: status.bucketName
                toFieldPath: spec.forProvider.bucket
                policy:
                  fromFieldPath: Required

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.encryption.kmsKeyId
                toFieldPath: spec.forProvider.rule[0].applyServerSideEncryptionByDefault[0].kmsMasterKeyId
                policy:
                  fromFieldPath: Optional

          # ============================================================
          # RESOURCE 4: Versioning
          # Waits for bucket to exist via policy: Required on bucketName
          # ============================================================
          - name: s3-versioning
            base:
              apiVersion: s3.aws.upbound.io/v1beta1
              kind: BucketVersioning
              spec:
                forProvider:
                  region: us-east-1
                  bucket: ""
                  versioningConfiguration:
                    - status: Suspended

            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.region

              - type: FromCompositeFieldPath
                fromFieldPath: status.bucketName
                toFieldPath: spec.forProvider.bucket
                policy:
                  fromFieldPath: Required

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.versioning
                toFieldPath: spec.forProvider.versioningConfiguration[0].status

          # ============================================================
          # RESOURCE 5: IAM Policy
          # Creates a scoped IAM policy granting read/write access to
          # this specific bucket. Waits for bucketArn via policy: Required.
          # Policy grants: GetObject, PutObject, DeleteObject, ListBucket
          # ============================================================
          - name: s3-iam-policy
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: Policy
              spec:
                deletionPolicy: Delete
                forProvider:
                  name: ""
                  document: ""

            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.deletionPolicy
                toFieldPath: spec.deletionPolicy

              # Policy name derived from claim name
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels[crossplane.io/claim-name]
                toFieldPath: spec.forProvider.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-s3-access-policy"

              # Build the IAM policy document using the bucket ARN
              # Waits for bucketArn to be written back from the bucket resource
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: status.bucketArn
                    - fromFieldPath: status.bucketArn
                  strategy: string
                  string:
                    fmt: |
                      {
                        "Version": "2012-10-17",
                        "Statement": [
                          {
                            "Effect": "Allow",
                            "Action": [
                              "s3:GetObject",
                              "s3:GetObjectVersion",
                              "s3:PutObject",
                              "s3:DeleteObject"
                            ],
                            "Resource": "%s/*"
                          },
                          {
                            "Effect": "Allow",
                            "Action": [
                              "s3:ListBucket",
                              "s3:GetBucketLocation",
                              "s3:GetBucketVersioning"
                            ],
                            "Resource": "%s"
                          }
                        ]
                      }
                toFieldPath: spec.forProvider.document
                policy:
                  fromFieldPath: Required

              # Write policy ARN back to XR status for reference
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.arn
                toFieldPath: status.iamPolicyArn

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.tags
                toFieldPath: spec.forProvider.tags
                policy:
                  fromFieldPath: Optional

          # ============================================================
          # RESOURCE 6: IAM Role Policy Attachment
          # Attaches the bucket policy to the developer's service IAM role.
          # OPTIONAL — only created if spec.parameters.serviceIamRole is set.
          # Uses policy: Optional so missing serviceIamRole is not an error.
          # ============================================================
          - name: s3-iam-role-policy-attachment
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: RolePolicyAttachment
              spec:
                deletionPolicy: Delete
                forProvider:
                  policyArnRef:
                    name: ""
                  roleNameRef:
                    name: ""

            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.deletionPolicy
                toFieldPath: spec.deletionPolicy

              # Reference the IAM policy by the composed resource name
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels[crossplane.io/claim-name]
                toFieldPath: spec.forProvider.policyArnRef.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-s3-access-policy"

              # Reference the IAM role the developer specified
              # policy: Optional — if serviceIamRole is not set, this
              # resource will not block the composition from completing
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.serviceIamRole
                toFieldPath: spec.forProvider.roleNameRef.name
                policy:
                  fromFieldPath: Optional