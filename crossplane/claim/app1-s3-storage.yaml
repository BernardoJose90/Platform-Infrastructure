apiVersion: aws.platform.upbound.io/v1alpha1
kind: Bucket
metadata:
  name: my-app-storage
  namespace: dev-team
  labels:
    app: my-app
    env: production

spec:
  parameters:
    region: us-east-1
    versioning: "Enabled"
    blockPublicAccess: true

    # Lifecycle is always Enabled — just control the retention values
    lifecycle:
      expirationDays: 365
      noncurrentVersionExpirationDays: 90
      abortIncompleteMultipartUploadDays: 7

    tags:
      cost-center: "engineering"
      project: "my-app"
      team: "dev-team"

    deletionPolicy: Delete

  writeConnectionSecretToRef:
    name: my-app-storage-secret