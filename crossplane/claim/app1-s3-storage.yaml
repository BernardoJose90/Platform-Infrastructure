apiVersion: aws.platform.upbound.io/v1alpha1
kind: Bucket
metadata:
  name: my-app-storage
  namespace: dev-team
spec:
  parameters:
    region: us-east-1
    versioning: "Enabled"
    blockPublicAccess: true
    serviceIamRole: "my-app-service-role"  # ← new, optional
    tags:
      cost-center: "engineering"
      team: "dev-team"
    deletionPolicy: Delete
  writeConnectionSecretToRef:
    name: my-app-storage-secret