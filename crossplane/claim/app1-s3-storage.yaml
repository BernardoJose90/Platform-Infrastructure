apiVersion: aws.platform.upbound.io/v1alpha1
kind: Bucket
metadata:
  name: my-app-storage
  namespace: dev-tem
  labels:
    app: my-app
    env: production

spec:
  parameters:

    # Required
    region: us-east-1

    # Optional: custom bucket name — globally unique in AWS
    # bucketName: my-company-my-app-storage-prod

    # CHANGED: string instead of boolean — "Enabled" or "Suspended"
    versioning: "Enabled"

    # Encryption — AES256 by default
    # Uncomment for KMS:
    # encryption:
    #   enabled: true
    #   kmsKeyId: "arn:aws:kms:us-east-1:123456789012:key/your-key-id"

    # Keep true unless static website hosting
    blockPublicAccess: true

    # CHANGED: lifecycle.enabled is now a string — "Enabled" or "Disabled"
    lifecycle:
      enabled: "Enabled"
      expirationDays: 365

      noncurrentVersionExpirationDays: 90


    tags:
      cost-center: "engineering"
      project: "my-app"
      team: "dev-tem"


    deletionPolicy: Delete


  writeConnectionSecretToRef:
    name: my-app-storage-secret